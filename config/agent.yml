repos:
  ask4anshuman/agentic-sql-repo:
    github:
      owner: ask4anshuman
      name: Agentic-SQL-Repo
      token: ${GITHUB_TOKEN_ASK4ANSHUMAN_AGENTIC_SQL_REPO}
      api_base_url: https://api.github.com
      webhook_secret: ${GITHUB_WEBHOOK_SECRET_ASK4ANSHUMAN_AGENTIC_SQL_REPO}
      approval_command: /approve-sql-doc
      approval_label: sql-doc-approved
      approval_state_file: .ai_sql_agent/approval_state.json
    llm:
      api_key: ${LLM_API_KEY_ASK4ANSHUMAN_AGENTIC_SQL_REPO}
      base_url: https://api.openai.com/v1
      model: gpt-4o-mini
      temperature: 0.1
      pr_summary_max_chars: 280
    confluence:
      base_url: https://ask4anshuman.atlassian.net/wiki
      space: ~712020e9a8b73325a347c490df3513526fcc64
      username: ask4anshuman@gmail.com
      api_token: ${CONFLUENCE_API_TOKEN_ASK4ANSHUMAN_AGENTIC_SQL_REPO}
      default_parent_page_id: '491521'
      path_mappings:
        - sql_path_prefix: ddl/
          parent_page_id: '111111'
        - sql_path_prefix: dml/
          parent_page_id: '222222'
        - sql_path_prefix: soft/
          parent_page_id: '333333'
  your-org-or-user/your-new-sql-repo:
    github:
      owner: your-org-or-user
      name: your-new-sql-repo
      token: ${GITHUB_TOKEN_YOUR_ORG_OR_USER_YOUR_NEW_SQL_REPO}
      api_base_url: https://api.github.com
      webhook_secret: ${GITHUB_WEBHOOK_SECRET_YOUR_ORG_OR_USER_YOUR_NEW_SQL_REPO}
      approval_command: /approve-sql-doc
      approval_label: sql-doc-approved
      approval_state_file: .ai_sql_agent/approval_state.json
    llm:
      api_key: ${LLM_API_KEY_YOUR_ORG_OR_USER_YOUR_NEW_SQL_REPO}
      base_url: https://api.openai.com/v1
      model: gpt-4o-mini
      temperature: 0.1
      pr_summary_max_chars: 280
    confluence:
      base_url: https://your-domain.atlassian.net/wiki
      space: YOUR_SPACE_OR_USER_SPACE
      username: you@example.com
      api_token: ${CONFLUENCE_API_TOKEN_YOUR_ORG_OR_USER_YOUR_NEW_SQL_REPO}
      default_parent_page_id: '491521'
      path_mappings:
        - sql_path_prefix: ddl/
          parent_page_id: '111111'
        - sql_path_prefix: dml/
          parent_page_id: '222222'
        - sql_path_prefix: soft/
          parent_page_id: '333333'

app:
  host: 0.0.0.0
  port: 8000
  repo_registry_file: config/agent.yml
